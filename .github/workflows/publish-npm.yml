name: Publish to npm

on:
  push:
    tags:
      - 'v*'

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          registry-url: https://registry.npmjs.org

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Set package versions from tag
        run: |
          npm version ${{ steps.version.outputs.version }} --no-git-tag-version --allow-same-version --workspace=packages/core --workspace=packages/cli
          # Update the CLI's dependency on core to match
          cd packages/cli
          npm pkg set "dependencies.@michaelborck/cite-sight-core=${{ steps.version.outputs.version }}"

      - name: Build core
        run: npm run build:core

      - name: Build CLI
        run: npx tsc -p packages/cli/tsconfig.json

      - name: Publish core
        working-directory: packages/core
        run: |
          # Publish under a temp tag, then move `latest` here with dist-tag.
          # A stray 1.0.0 on the registry blocks npm's implicit-latest guard
          # (latest "must be highest"); dist-tag can still target a sub-1.0.0
          # version, so this keeps the 0.8.x line installable as `latest`.
          npm publish --access public --tag next
          npm dist-tag add @michaelborck/cite-sight-core@${{ steps.version.outputs.version }} latest || true
          npm dist-tag rm @michaelborck/cite-sight-core next || true
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish CLI
        working-directory: packages/cli
        run: |
          npm publish --access public --tag next
          npm dist-tag add cite-sight@${{ steps.version.outputs.version }} latest || true
          npm dist-tag rm cite-sight next || true
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
