name: Publish to npm

on:
  push:
    tags:
      - 'v*'

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          registry-url: https://registry.npmjs.org

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Set package versions from tag
        run: |
          npm version ${{ steps.version.outputs.version }} --no-git-tag-version --workspace=packages/core --workspace=packages/cli
          # Update the CLI's dependency on core to match
          cd packages/cli
          npm pkg set "dependencies.@michaelborck/cite-sight-core=${{ steps.version.outputs.version }}"

      - name: Build core
        run: npm run build:core

      - name: Build CLI
        run: npx tsc -p packages/cli/tsconfig.json

      - name: Publish core
        working-directory: packages/core
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish CLI
        working-directory: packages/cli
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
