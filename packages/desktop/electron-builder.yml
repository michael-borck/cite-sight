appId: com.citesight.desktop
productName: CiteSight
directories:
  output: release
  buildResources: resources
files:
  - dist/**/*
  - package.json
publish:
  provider: github
mac:
  target:
    - dmg
    - zip
  category: public.app-category.education
  # Code signing — set these env vars in CI or locally:
  #   CSC_LINK: path or base64 of .p12 certificate
  #   CSC_KEY_PASSWORD: certificate password
  #   APPLE_ID: your Apple ID email
  #   APPLE_APP_SPECIFIC_PASSWORD: app-specific password
  #   APPLE_TEAM_ID: your team ID
  notarize: false  # flip to true once signing is configured
win:
  target: nsis
linux:
  target: AppImage
