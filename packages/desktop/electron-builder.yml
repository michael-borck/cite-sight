appId: com.citesight.desktop
productName: CiteSight
directories:
  output: release
  buildResources: resources
files:
  - dist/**/*
  - package.json
publish:
  provider: github
# electron-builder's own notarize wrapper has been buggy across 24.x/26.x.
# We disable it (notarize: false) and call @electron/notarize directly from afterSign.
afterSign: ./scripts/notarize.js
mac:
  target:
    - dmg
    - zip
  category: public.app-category.education
  hardenedRuntime: true
  notarize: false
win:
  target: nsis
linux:
  target: AppImage
