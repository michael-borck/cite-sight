appId: com.citesight.desktop
productName: CiteSight
directories:
  output: release
  buildResources: resources
files:
  - dist/**/*
  - package.json
publish:
  provider: github
# electron-builder's own notarize wrapper has been buggy across 24.x/26.x.
# We disable it (notarize: false) and run our own hooks:
#   afterSign            — notarises + staples the .app bundle
#   afterAllArtifactBuild — signs + notarises + staples each .dmg container
afterSign: ./scripts/notarize.cjs
afterAllArtifactBuild: ./scripts/notarize-dmg.cjs
mac:
  target:
    - target: dmg
      arch: [x64, arm64]
    - target: zip
      arch: [x64, arm64]
  category: public.app-category.education
  hardenedRuntime: true
  notarize: false
win:
  target: nsis
linux:
  target: AppImage
