appId: com.citesight.desktop
productName: CiteSight
directories:
  output: release
  buildResources: resources
files:
  - dist/**/*
  - package.json
publish:
  provider: github
mac:
  target:
    - dmg
    - zip
  category: public.app-category.education
  identity: null  # skip code signing (set CSC_LINK env var to enable)
  notarize: false  # flip to true once signing is configured
win:
  target: nsis
linux:
  target: AppImage
